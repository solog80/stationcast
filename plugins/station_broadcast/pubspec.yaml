name: station_broadcast
description: "SRT/RTMP camera+mic broadcast engine for Flutter. Wraps StreamPack (Android) and HaishinKit (iOS)."
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.12.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: tv.stationcast.station_broadcast
        pluginClass: StationBroadcastPlugin
      ios:
        pluginClass: StationBroadcastPlugin
