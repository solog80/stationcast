name: station_cast
description: "Field contribution broadcaster: SRT/RTMP camera+mic publishing with a floating SRT return-feed preview."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Firebase
  firebase_core: ^3.12.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.3.0

  # Broadcast engine (local plugin: StreamPack on Android, HaishinKit on iOS)
  station_broadcast:
    path: plugins/station_broadcast

  # Platform services
  shared_preferences: ^2.3.0
  wakelock_plus: ^1.2.10
  permission_handler: ^12.0.0
  battery_plus: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  android: true
  remove_alpha_ios: true
  image_path_ios: "assets/images/Station_Cast_App_Logo.png"
  image_path_android: "assets/images/Station_Cast_App_Logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/Station_Cast_App_Logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
